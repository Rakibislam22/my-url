name: CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build Project
        run: npm run build